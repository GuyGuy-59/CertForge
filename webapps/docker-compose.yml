services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./volumes/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      certforge:
        condition: service_healthy
    restart: unless-stopped

  certforge:
    build:
      context: .
      dockerfile: ./build/Dockerfile
    image: certforge:latest
    container_name: certforge
    expose:
      - "5000"
    volumes:
      - ./volumes/pki:/data
      - ./volumes/app:/app/webapps
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
