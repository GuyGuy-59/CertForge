<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CertForge — Sign in</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div>
        <div class="login-logo-text">CertForge</div>
        <div class="login-subtitle">Certificate Authority Management</div>
      </div>
    </div>

    {% if error %}
    <div class="alert alert-danger login-error" style="margin-bottom:1.25rem">{{ error }}</div>
    {% endif %}

    <form method="post" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" type="text" name="username" class="form-control"
               required autofocus autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:1.5rem">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" name="password" class="form-control"
               required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.6rem">
        Sign in
      </button>
    </form>
  </div>
</div>
</body>
</html>
