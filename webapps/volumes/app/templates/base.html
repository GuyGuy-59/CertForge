<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CertForge{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="{{ url_for('main.dashboard') }}">
    <span class="nav-brand-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </span>
    CertForge
  </a>
  {% if session.user %}
  <span class="nav-divider"></span>
  <div class="nav-right">
    <span class="nav-user">{{ session.user }}</span>
    <a href="{{ url_for('main.logout') }}" class="nav-logout">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </a>
  </div>
  {% endif %}
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

<div id="toast-container"></div>

<script>
(function() {
  var ICONS = {
    success: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>',
    danger:  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    warning: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    info:    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
  };
  var TITLES = { success: 'Success', danger: 'Error', warning: 'Warning', info: 'Info' };
  var DURS   = { success: 4000, danger: 6000, warning: 5000, info: 4000 };
  var CLOSE_SVG = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

  window.showToast = function(type, message) {
    var dur = DURS[type] || 4000;
    var el  = document.createElement('div');
    el.className = 'toast toast-' + type;
    el.innerHTML =
      '<span class="toast-icon">' + (ICONS[type] || ICONS.info) + '</span>' +
      '<div class="toast-body">' +
        '<div class="toast-title">' + (TITLES[type] || 'Notice') + '</div>' +
        '<div class="toast-msg">'   + message + '</div>' +
      '</div>' +
      '<button class="toast-close" aria-label="Dismiss" onclick="dismissToast(this.closest(\'.toast\'))">' + CLOSE_SVG + '</button>' +
      '<div class="toast-bar" style="animation-duration:' + dur + 'ms"></div>';
    document.getElementById('toast-container').appendChild(el);
    el._tid = setTimeout(function() { dismissToast(el); }, dur);
  };

  window.dismissToast = function(el) {
    if (!el || el._dismissing) return;
    el._dismissing = true;
    clearTimeout(el._tid);
    el.style.transition = 'opacity .2s ease, transform .22s ease';
    el.style.opacity = '0';
    el.style.transform = 'translateX(calc(100% + 2rem))';
    setTimeout(function() { if (el.parentNode) el.remove(); }, 250);
  };
})();
</script>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  {% for cat, msg in messages %}showToast('{{ cat }}', {{ msg | tojson }});
  {% endfor %}
});
</script>
{% endif %}
{% endwith %}

{% block scripts %}{% endblock %}
</body>
</html>
